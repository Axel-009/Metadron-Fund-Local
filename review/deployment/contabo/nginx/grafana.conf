# =============================================================================
# NGINX Configuration — Metadron Monitoring (Contabo VPS)
# Domain: monitor.metadroncapital.com
# =============================================================================
# This config:
#   - Proxies Grafana (localhost:3000) at monitor.metadroncapital.com
#   - Proxies Uptime Kuma (localhost:3001) at status.metadroncapital.com
#   - Enforces HTTPS via Cloudflare Origin Certificates
#   - Redirects HTTP → HTTPS
#
# Authentication options (choose ONE):
#   A) Cloudflare Access (recommended) — zero-trust SSO in front of the domain.
#      No NGINX changes needed; just configure Cloudflare Access policies.
#      Grafana itself should still have auth enabled as defense-in-depth.
#   B) NGINX HTTP Basic Auth — simple username/password gate.
#      Create htpasswd: htpasswd -c /etc/nginx/.htpasswd admin
#      Uncomment the auth_basic lines in each server block.
#
# SSL Certs:
#   Place Cloudflare Origin Certificate files at:
#     /etc/ssl/cloudflare/monitor.metadroncapital.com.pem  (cert)
#     /etc/ssl/cloudflare/monitor.metadroncapital.com.key  (private key)
#   Generate at: Cloudflare Dashboard → SSL/TLS → Origin Server
# =============================================================================

# Rate limiting zone — protects Grafana login endpoint
limit_req_zone $binary_remote_addr zone=grafana_login:10m rate=5r/m;

# =============================================================================
# HTTP → HTTPS Redirect (all domains)
# =============================================================================
server {
    listen      80;
    listen      [::]:80;
    server_name monitor.metadroncapital.com status.metadroncapital.com;

    # Allow Certbot ACME challenges (if using Let's Encrypt instead of Cloudflare)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# Grafana — monitor.metadroncapital.com
# =============================================================================
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name monitor.metadroncapital.com;

    # ---------------------------------------------------------------------------
    # SSL — Cloudflare Origin Certificate
    # ---------------------------------------------------------------------------
    ssl_certificate     /etc/ssl/cloudflare/monitor.metadroncapital.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/monitor.metadroncapital.com.key;

    # Modern SSL configuration (Cloudflare Origin Cert uses EC or RSA)
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;

    # HSTS — only enable after you've confirmed HTTPS works correctly
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ---------------------------------------------------------------------------
    # Cloudflare Access (Option A — recommended)
    # If you've configured Cloudflare Access policies for this hostname,
    # no additional NGINX auth is needed. Cloudflare validates the JWT.
    # To verify the Cf-Access-Jwt-Assertion header, add:
    # ---------------------------------------------------------------------------
    # add_header X-Frame-Options "SAMEORIGIN";
    # add_header X-Content-Type-Options "nosniff";

    # ---------------------------------------------------------------------------
    # NGINX Basic Auth (Option B — uncomment to enable)
    # ---------------------------------------------------------------------------
    # auth_basic           "Metadron Monitoring";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    access_log /var/log/nginx/grafana-access.log;
    error_log  /var/log/nginx/grafana-error.log warn;

    # ---------------------------------------------------------------------------
    # Security Headers
    # ---------------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------------------------------------------------------------------------
    # Proxy to Grafana
    # ---------------------------------------------------------------------------
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support — required for Grafana live features
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client info
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — increase for long-running Grafana queries
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Buffer settings
        proxy_buffering    off;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }

    # Rate-limit the login endpoint to prevent brute force
    location /login {
        limit_req zone=grafana_login burst=3 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana API — allow websocket connections
    location /api/live {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $http_host;
    }
}

# =============================================================================
# Uptime Kuma — status.metadroncapital.com
# =============================================================================
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name status.metadroncapital.com;

    # Re-use the same Cloudflare Origin Cert if it's a wildcard cert
    # Otherwise generate a separate cert for this subdomain
    ssl_certificate     /etc/ssl/cloudflare/metadroncapital.com-wildcard.pem;
    ssl_certificate_key /etc/ssl/cloudflare/metadroncapital.com-wildcard.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    access_log /var/log/nginx/uptime-kuma-access.log;
    error_log  /var/log/nginx/uptime-kuma-error.log warn;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # ---------------------------------------------------------------------------
    # Proxy to Uptime Kuma
    # Uptime Kuma requires WebSocket for real-time dashboard updates
    # ---------------------------------------------------------------------------
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        proxy_buffering off;
    }
}

# =============================================================================
# Netdata — Internal access only (NOT exposed publicly)
# Netdata runs on port 19999. Access via SSH tunnel:
#   ssh -L 19999:localhost:19999 user@contabo-ip
# If you want to expose it, add another server block similar to Grafana above.
# WARNING: Netdata can expose sensitive system information — keep it internal.

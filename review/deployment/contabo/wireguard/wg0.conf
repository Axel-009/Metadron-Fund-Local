# =============================================================================
# WireGuard Configuration — Contabo Monitoring VPS (10.0.0.2)
# =============================================================================
# This is the CLIENT side of the WireGuard tunnel.
# The Hetzner GEX44 (10.0.0.1) acts as the SERVER/peer.
#
# Tunnel topology:
#   Contabo VPS  ←── wg0 (10.0.0.2) ────────── wg0 (10.0.0.1) ──→  Hetzner GEX44
#
# Setup steps:
#   1. Generate keys:  wg genkey | tee contabo-private.key | wg pubkey > contabo-public.key
#   2. Copy contabo-public.key to the GEX44 and add it as a [Peer] there
#   3. Copy the GEX44's public key into <GEX44_PUBLIC_KEY> below
#   4. Replace <GEX44_PUBLIC_IP> with the GEX44's actual public IP
#   5. wg-quick up wg0  (or enable: systemctl enable --now wg-quick@wg0)
#
# Security notes:
#   - AllowedIPs is intentionally /32 (only the GEX44 WireGuard address).
#     This is a point-to-point monitoring tunnel — not a full VPN gateway.
#     Do NOT set AllowedIPs to 0.0.0.0/0 (that would route all traffic through
#     the GEX44 and break internet access on the Contabo box).
#   - The private key must be chmod 600 and owned by root.
# =============================================================================

[Interface]
# This Contabo VPS's WireGuard IP address
Address = 10.0.0.2/24

# The private key for this interface
# IMPORTANT: Replace with output of:  wg genkey
PrivateKey = <CONTABO_WIREGUARD_PRIVATE_KEY>

# WireGuard listens on this UDP port (on the Contabo side).
# Does not need to be publicly reachable — Contabo initiates connections.
# Uncomment if you need the GEX44 to initiate (bidirectional).
# ListenPort = 51821

# DNS server (optional — only needed if tunnel is used for DNS resolution)
# DNS = 10.0.0.1

# Run these commands after the interface comes up
PostUp   = iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT

# =============================================================================
# Peer: Hetzner GEX44 Trading Server
# =============================================================================
[Peer]
# The GEX44's WireGuard public key
# Replace with:  cat /etc/wireguard/gex44-public.key  (on the GEX44)
PublicKey = <GEX44_WIREGUARD_PUBLIC_KEY>

# GEX44's public IP and WireGuard listen port
# Replace <GEX44_PUBLIC_IP> with the actual IP from Hetzner
Endpoint = <GEX44_PUBLIC_IP>:51820

# Only route traffic destined for the GEX44 WireGuard IP through the tunnel.
# This keeps the monitoring traffic isolated — no default gateway override.
AllowedIPs = 10.0.0.1/32

# Send a keepalive packet every 25 seconds to maintain the tunnel through NAT.
# Essential for Contabo → Hetzner since Contabo may be behind NAT.
PersistentKeepalive = 25

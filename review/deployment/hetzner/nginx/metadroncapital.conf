# =============================================================================
# NGINX Configuration — metadroncapital.com
# Server:  Hetzner GEX44 dedicated
# Updated: 2025
#
# Architecture overview:
#   - Static marketing site served directly from /opt/metadron/marketing/
#   - /terminal/  → Express frontend on :5000 (React terminal app, WebSocket)
#   - /api/engine/ → Express :5000 → FastAPI engine :8001
#   - Cloudflare proxied; SSL terminated here with Cloudflare Origin Certificate
#   - /metrics    → internal only (WireGuard 10.0.0.0/24)
#   - Rate limiting protects API and general traffic separately
# =============================================================================

# ---------------------------------------------------------------------------
# Rate limiting zones  (defined in http context — include from nginx.conf or
# place this file inside an http{} block via sites-enabled)
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=30r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/s;

# ---------------------------------------------------------------------------
# Upstream definitions  (makes maintenance easier)
# ---------------------------------------------------------------------------
upstream express_app {
    server 127.0.0.1:5000;
    keepalive 32;
}

# FastAPI engine — proxied directly for internal health/status checks if needed
upstream fastapi_engine {
    server 127.0.0.1:8001;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# HTTP — redirect all traffic to HTTPS
# ---------------------------------------------------------------------------
server {
    listen      80;
    listen      [::]:80;
    server_name metadroncapital.com www.metadroncapital.com;

    # Cloudflare sends real-protocol header; honour it for logging
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    access_log  /var/log/nginx/metadron-access.log;
    error_log   /var/log/nginx/metadron-error.log warn;

    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# HTTPS — main server block
# ---------------------------------------------------------------------------
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name metadroncapital.com www.metadroncapital.com;

    # -----------------------------------------------------------------------
    # Cloudflare Origin Certificate
    # Generate at: Cloudflare dashboard → SSL/TLS → Origin Server → Create
    # Place files at:
    #   /etc/ssl/cloudflare/origin.pem      (certificate)
    #   /etc/ssl/cloudflare/origin-key.pem  (private key, chmod 600)
    # -----------------------------------------------------------------------
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin-key.pem;

    # Modern TLS settings (Cloudflare Full Strict mode recommended)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Restrict to Cloudflare IP ranges only (Origin Certificate + Cloudflare proxy)
    # Uncomment these lines to enforce that only Cloudflare can reach origin:
    # allow 103.21.244.0/22;
    # ... (add all CF ranges above)
    # deny all;

    # Cloudflare real-IP forwarding
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # -----------------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------------
    access_log /var/log/nginx/metadron-access.log combined buffer=32k flush=5s;
    error_log  /var/log/nginx/metadron-error.log  warn;

    # -----------------------------------------------------------------------
    # Security headers
    # -----------------------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"              always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header X-XSS-Protection          "1; mode=block"           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Content-Security-Policy — tighten after initial deploy
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' wss://metadroncapital.com; frame-ancestors 'none';"
        always;

    # -----------------------------------------------------------------------
    # Gzip compression
    # -----------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # -----------------------------------------------------------------------
    # Global proxy settings (applied to all upstream proxy blocks)
    # -----------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout  120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout  120s;

    # -----------------------------------------------------------------------
    # Static marketing site  —  served directly from disk
    # Path: /opt/metadron/marketing/
    # -----------------------------------------------------------------------
    location / {
        limit_req zone=general_limit burst=120 nodelay;

        root  /opt/metadron/marketing;
        index index.html index.htm;

        # SPA fallback — serve index.html for unknown paths
        try_files $uri $uri/ /index.html;

        # Cache control for HTML (do not cache — Cloudflare handles edge caching)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma        "no-cache";
            expires 0;
        }

        # Static asset caching — 30 days for images, fonts, css, js
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
            expires        30d;
            add_header     Cache-Control "public, immutable";
            access_log     off;
        }

        location ~* \.(css|js)$ {
            expires        30d;
            add_header     Cache-Control "public, immutable";
            access_log     off;
        }

        location ~* \.(woff|woff2|ttf|eot|otf)$ {
            expires        30d;
            add_header     Cache-Control "public, immutable";
            add_header     Access-Control-Allow-Origin "*";
            access_log     off;
        }
    }

    # -----------------------------------------------------------------------
    # React Terminal App  —  Express :5000
    # WebSocket support required for hot-reload / live data feeds
    # -----------------------------------------------------------------------
    location /terminal/ {
        limit_req zone=general_limit burst=120 nodelay;

        proxy_pass http://express_app;

        # WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Increase timeouts for long-lived WS connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        # Strip the /terminal prefix before passing to Express
        # (Express should be configured to handle /terminal or use rewrite)
        rewrite ^/terminal(/.*)$ $1 break;
    }

    # -----------------------------------------------------------------------
    # Engine API  —  Express :5000 (which forwards to FastAPI :8001)
    # Rate-limited more aggressively as this is the trading API path
    # -----------------------------------------------------------------------
    location /api/engine/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass http://express_app;

        # Keep headers clean for API responses
        proxy_set_header Upgrade    "";
        proxy_set_header Connection "close";

        # Pass through the full path (Express handles /api/engine/ routing)
        # Express then proxies to http://127.0.0.1:8001
    }

    # -----------------------------------------------------------------------
    # Prometheus metrics endpoint  —  WireGuard-only
    # Scrape target for Contabo monitoring VPS (10.0.0.2)
    # -----------------------------------------------------------------------
    location /metrics {
        # Only allow WireGuard subnet; deny everything else
        allow  10.0.0.0/24;
        deny   all;

        # Proxy to node_exporter running on :9100
        # The monitoring VPS should scrape individual exporter ports directly
        # over WireGuard; this path is a convenience aggregation endpoint.
        proxy_pass http://127.0.0.1:9100/metrics;

        proxy_set_header Host      "localhost";
        proxy_read_timeout 10s;
        access_log off;
    }

    # -----------------------------------------------------------------------
    # NGINX stub_status  —  for prometheus-nginx-exporter
    # Accessible only from localhost and WireGuard subnet
    # -----------------------------------------------------------------------
    location /nginx_status {
        stub_status;

        allow  127.0.0.1;
        allow  ::1;
        allow  10.0.0.0/24;   # WireGuard
        deny   all;

        access_log off;
    }

    # -----------------------------------------------------------------------
    # Block common attack vectors / scanners
    # -----------------------------------------------------------------------
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }

    location ~* /(wp-admin|wp-login|xmlrpc|phpmyadmin|\.env|\.git) {
        return 444;
    }

    # -----------------------------------------------------------------------
    # Max body size (adjust for file upload routes if needed)
    # -----------------------------------------------------------------------
    client_max_body_size 16m;
}

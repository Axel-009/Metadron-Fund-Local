# =============================================================================
# WireGuard configuration — wg0
# Role:    GEX44 server (hub)  ←→  Contabo monitoring VPS (peer)
# Tunnel:  10.0.0.1/24  (GEX44)   10.0.0.2/32  (Contabo)
#
# PURPOSE
#   The monitoring VPS (Contabo) reaches the GEX44 private exporters over
#   this encrypted tunnel:
#     node_exporter           :9100
#     nginx-prometheus-exporter :9113
#     pm2-prometheus-exporter  :9209
#     FastAPI engine (metrics) :8001
#
# KEY GENERATION (run once on each host)
#   # On GEX44 (this host):
#   wg genkey | tee /etc/wireguard/gex44_private.key | wg pubkey > /etc/wireguard/gex44_public.key
#   chmod 600 /etc/wireguard/gex44_private.key
#   cat /etc/wireguard/gex44_private.key    # paste into PrivateKey below
#   cat /etc/wireguard/gex44_public.key     # share with Contabo peer config
#
#   # On Contabo VPS:
#   wg genkey | tee /etc/wireguard/contabo_private.key | wg pubkey > /etc/wireguard/contabo_public.key
#   cat /etc/wireguard/contabo_public.key   # paste into [Peer] PublicKey below
#
# INSTALLATION
#   sudo cp wg0.conf /etc/wireguard/wg0.conf
#   sudo chmod 600   /etc/wireguard/wg0.conf
#   sudo systemctl enable --now wg-quick@wg0
#
# VERIFICATION
#   sudo wg show wg0
#   ping 10.0.0.2
# =============================================================================

[Interface]
# This server's WireGuard tunnel IP (acts as the VPN hub)
Address = 10.0.0.1/24

# WireGuard listens on this UDP port — must be open in UFW (51820/udp)
ListenPort = 51820

# REPLACE with output of:  cat /etc/wireguard/gex44_private.key
PrivateKey = <GEX44_PRIVATE_KEY_PLACEHOLDER>

# Optional: save iptables rules when tunnel comes up/down
# (PostUp/PreDown manage NAT if you want to route traffic through the tunnel)
# PostUp   = iptables -A FORWARD -i %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
# PreDown  = iptables -D FORWARD -i %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# DNS — not required for a point-to-point monitoring tunnel
# DNS = 1.1.1.1

# ---------------------------------------------------------------------------
# Peer: Contabo Monitoring VPS
# ---------------------------------------------------------------------------
[Peer]
# Human-readable comment (not parsed by wg)
# Name: Contabo Monitoring VPS

# REPLACE with output of:  cat /etc/wireguard/contabo_public.key  (on Contabo host)
PublicKey = <CONTABO_VPS_PUBLIC_KEY_PLACEHOLDER>

# This peer's tunnel IP — only allow packets from this IP range
AllowedIPs = 10.0.0.2/32

# The Contabo VPS's public IP address and WireGuard port
# REPLACE with the actual Contabo VPS IPv4 address
Endpoint = <CONTABO_VPS_PUBLIC_IP>:51820

# Keep-alive: send a packet every 25 s to maintain NAT mappings
# Required because the GEX44 has a stable IP but Contabo may sit behind NAT
PersistentKeepalive = 25

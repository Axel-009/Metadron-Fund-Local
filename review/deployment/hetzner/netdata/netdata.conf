# =============================================================================
# Netdata Configuration — Metadron Capital GEX44 Trading Server
#
# Install on Rocky Linux 9:
#   curl -fsSL https://get.netdata.cloud/kickstart.sh | bash
#
# This config goes to: /etc/netdata/netdata.conf
# =============================================================================

[global]
    hostname = gex44-metadron
    update every = 1
    history = 86400          # 24 hours at 1-second granularity
    memory mode = dbengine
    page cache size = 64     # MB — keep recent data in RAM
    dbengine multihost disk space = 2048  # 2GB disk for long-term

[web]
    bind to = 0.0.0.0:19999
    allow connections from = *
    enable gzip compression = yes

[plugins]
    # GPU monitoring via nvidia-smi
    cgroups = yes
    apps = yes
    proc = yes
    python.d = yes
    go.d = yes
    charts.d = yes

[plugin:proc]
    # Network interface monitoring
    /proc/net/dev = yes
    /proc/net/snmp = yes

[plugin:apps]
    # Track PM2-managed processes by name
    update every = 2

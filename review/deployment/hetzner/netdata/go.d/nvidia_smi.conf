# =============================================================================
# Netdata NVIDIA GPU Monitoring — GEX44 RTX 4000 SFF Ada (20GB VRAM)
#
# Place at: /etc/netdata/go.d/nvidia_smi.conf
# Requires: nvidia-smi installed (comes with NVIDIA driver)
#
# Monitors: GPU utilization, VRAM usage, temperature, power draw, clock speeds
# =============================================================================

jobs:
  - name: gpu0
    binary_path: /usr/bin/nvidia-smi
    update_every: 5

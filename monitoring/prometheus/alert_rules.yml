groups:
  - name: metadron_critical
    rules:
      - alert: KillSwitchActive
        expr: metadron_cube_regime{regime_name="CRASH"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kill Switch ACTIVE — MetadronCube in CRASH regime"
          description: "The MetadronCube has entered CRASH regime. All positions should be de-risked to beta <= 0.35."

      - alert: DrawdownExceeded
        expr: (1 - metadron_portfolio_nav / metadron_portfolio_nav offset 1d) > 0.20
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Portfolio drawdown exceeds 20% — kill switch threshold"
          description: "NAV has declined more than 20% from the previous day. Per allocation rules: 20% max drawdown kill switch activates."

      - alert: DailyLossCircuitBreaker
        expr: metadron_portfolio_pnl_daily < -0.03 * metadron_portfolio_nav
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Daily loss circuit breaker triggered (>3% NAV)"
          description: "Daily P&L loss exceeds 3% of NAV. Risk gate G3 should halt new trades."

  - name: metadron_performance
    rules:
      - alert: ScanCycleSlow
        expr: metadron_api_duration_seconds{endpoint="/api/engine/pipeline/run"} > 1200
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Full scan cycle exceeds 20 minutes"
          description: "Full 20-min cycle (10 min scan + 5 min execution + 5 min risk/backtesting) has exceeded its budget. Check data source timeouts or CPU."

      - alert: EngineAPIDown
        expr: metadron_engine_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Metadron Engine API is DOWN"
          description: "FastAPI engine API not responding."

      - alert: OpenBBErrorSpike
        expr: rate(metadron_openbb_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OpenBB data error rate is elevated"
          description: "More than 0.1 errors/sec from OpenBB."

  - name: metadron_agents
    rules:
      - alert: AgentPermissionBlocksHigh
        expr: rate(metadron_agents_enforcement_events{severity="critical"}[1m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Agent permission blocks exceed 10/min"
          description: "Agents are being blocked at an elevated rate."

      - alert: AgentHerdingRisk
        expr: metadron_agents_herding_risk > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Agent herding risk is elevated (>0.8)"
          description: "Agents converging on similar positions."

  - name: metadron_infrastructure
    rules:
      - alert: PM2RestartSpike
        expr: increase(metadron_pm2_process_restarts[10m]) > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "PM2 process {{ $labels.process }} restarted 3+ times in 10 minutes"
          description: "Investigate logs for crash loops."

      - alert: HighMemoryUsage
        expr: metadron_pm2_process_memory_bytes > 4e9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PM2 process {{ $labels.process }} using >4GB RAM"

      - alert: CreditStressElevated
        expr: metadron_fi_hy_oas > 600
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "HY OAS spread above 600bps — credit stress"

      - alert: VaRBreach
        expr: metadron_mc_var95 > 300000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Monte Carlo VaR 95% exceeds $300K limit"
          description: "Portfolio VaR breached $300K on $20M NAV."

  # ─── GPU / CUDA Health ─────────────────────────────────────────
  - name: metadron_gpu
    rules:
      - alert: GPUVRAMCritical
        expr: nvidia_smi_memory_used_bytes / nvidia_smi_memory_total_bytes > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "GPU VRAM usage above 95% — OOM risk"
          description: "VRAM at {{ $value | humanizePercentage }}. Reduce model load or restart inference servers."

      - alert: GPUTemperatureHigh
        expr: nvidia_smi_temperature_gpu > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU temperature above 85°C"

      - alert: GPUUtilizationSaturation
        expr: nvidia_smi_utilization_gpu > 95
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "GPU utilization above 95% for 10 minutes — inference bottleneck"

  # ─── Model Server Health ───────────────────────────────────────
  - name: metadron_model_servers
    rules:
      - alert: QwenServerDown
        expr: up{job="metadron-qwen"} == 0 or up{job="qwen-model-server"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Qwen 2.5-7B model server (port 8004) is down"

      - alert: LlamaServerDown
        expr: up{job="metadron-llama"} == 0 or up{job="llama-model-server"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Llama 3.1-8B model server (port 8005) is down"

      - alert: AirLLMServerDown
        expr: up{job="metadron-airllm"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Air-LLM model server (port 8003) is down"

      - alert: LLMBridgeDown
        expr: up{job="metadron-llm-bridge"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "LLM Inference Bridge (port 8002) is down — all inference offline"

      - alert: ModelInferenceLatencyHigh
        expr: metadron_llm_duration_seconds{quantile="0.95"} > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Model inference p95 latency exceeds 30 seconds"

  # ─── Netdata / System Health ───────────────────────────────────
  - name: metadron_system
    rules:
      - alert: NetdataDown
        expr: up{job="netdata"} == 0 or up{job="netdata-gex44"} == 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Netdata agent on GEX44 is down"

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "GEX44 root disk below 10% free — model cache may fill disk"

      - alert: RAMPressureHigh
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GEX44 RAM usage above 90% — PM2 services may OOM"

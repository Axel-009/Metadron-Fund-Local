global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Metadron Engine API (FastAPI + all engines)
  - job_name: "metadron-engine-api"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["localhost:8001"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "engine-api"

  # LLM Inference Bridge
  - job_name: "metadron-llm-bridge"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:8002"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "llm-bridge"

  # Air-LLM Model Server
  - job_name: "metadron-airllm"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:8003"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "airllm-server"

  # Node Exporter (host metrics)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["localhost:9100"]

  # Qwen 2.5-7B Model Server (port 8004)
  - job_name: "metadron-qwen"
    metrics_path: "/health"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:8004"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "qwen-server"

  # Llama 3.1-8B Model Server (port 8005)
  - job_name: "metadron-llama"
    metrics_path: "/health"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:8005"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "llama-server"

  # Netdata (GEX44 system + GPU metrics)
  - job_name: "netdata"
    metrics_path: "/api/v1/allmetrics"
    params:
      format: ["prometheus"]
    scrape_interval: 15s
    static_configs:
      - targets: ["localhost:19999"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "gex44-netdata"

  # Express Frontend
  - job_name: "metadron-frontend"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:5000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "express-frontend"

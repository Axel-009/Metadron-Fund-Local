global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Metadron Engine API (FastAPI + all engines)
  - job_name: "metadron-engine-api"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["localhost:8001"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "engine-api"

  # LLM Inference Bridge
  - job_name: "metadron-llm-bridge"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:8002"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "llm-bridge"

  # Air-LLM Model Server
  - job_name: "metadron-airllm"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:8003"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "airllm-server"

  # Node Exporter (host metrics)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["localhost:9100"]

  # Express Frontend
  - job_name: "metadron-frontend"
    metrics_path: "/metrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:5000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "express-frontend"
